name: Market Scanner (Parallel)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * 1-5' # Runs every 4 hours on weekdays

jobs:
  scan-chunk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        chunk_id: [0, 1, 2, 3, 4, 5, 6, 7]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scanner/requirements.txt

      - name: Run Scanner Chunk
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CHUNK_ID: ${{ matrix.chunk_id }}
        run: |
          cd scanner
          echo "Running chunk $CHUNK_ID..."
          python run_scanner.py --config BP_config.yaml --chunk-id $CHUNK_ID --ci-mode

      - name: Upload Chunk Results
        uses: actions/upload-artifact@v4
        with:
          name: chunk-results-${{ matrix.chunk_id }}
          path: scanner/chunk_result_${{ matrix.chunk_id }}.json
          if-no-files-found: ignore

  merge-results:
    needs: scan-chunk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scanner/requirements.txt

      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          path: downloaded_chunks

      - name: Merge Results
        run: |
          cd scanner
          python merge_results.py --input-dir ../downloaded_chunks --output-file final_scan_results.json

      - name: Upload Final Result
        uses: actions/upload-artifact@v4
        with:
          name: final-scan-results
          path: scanner/final_scan_results.json
